<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkedIn Profile Scraper — Control Panel</title>
    <meta name="description" content="Control panel for the Google LinkedIn Profile Scraper API">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- ===================== HEADER ===================== -->
    <header class="header">
        <div class="header__brand">
            <div class="header__icon">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            </div>
            <div>
                <h1 class="header__title">Google → LinkedIn Scraper</h1>
                <p class="header__subtitle">Search Google for LinkedIn profiles and extract data</p>
            </div>
        </div>
        <div class="header__status" id="api-status">
            <span class="dot dot--offline"></span>
            <span class="status-text">Checking API…</span>
        </div>
    </header>

    <main class="main">
        <!-- ===================== FORM CARD ===================== -->
        <section class="card card--form" id="form-section">
            <h2 class="card__title">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/></svg>
                New Search
            </h2>
            <form id="scrape-form" autocomplete="off">
                <div class="form-group">
                    <label for="keywords">Keywords <span class="hint">(comma-separated)</span></label>
                    <input type="text" id="keywords" placeholder="e.g. developer, engineer, data scientist" required>
                </div>
                <div class="form-group">
                    <label for="oblig_keywords">Obligatory Keywords <span class="hint">(present in every result)</span></label>
                    <input type="text" id="oblig_keywords" placeholder="e.g. python senior">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="max_profiles">Max Profiles</label>
                        <input type="number" id="max_profiles" value="50" min="1" max="5000" required>
                    </div>
                    <div class="form-group">
                        <label for="max_per_keyword">Per Keyword</label>
                        <input type="number" id="max_per_keyword" value="20" min="1" max="1000" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="api_key">API Key</label>
                    <input type="text" id="api_key" value="dev-api-key-change-in-production" required>
                </div>
                <button type="submit" class="btn btn--primary" id="start-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                    Start Scraping
                </button>
            </form>
        </section>

        <!-- ===================== JOB STATUS ===================== -->
        <section class="card card--status hidden" id="status-section">
            <h2 class="card__title">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                Job Progress
            </h2>
            <div class="progress-bar-outer">
                <div class="progress-bar-inner" id="progress-bar" style="width: 0%"></div>
            </div>
            <div class="status-details">
                <div class="kv"><span class="kv__key">Job ID</span><span class="kv__val" id="job-id">—</span></div>
                <div class="kv"><span class="kv__key">Status</span><span class="kv__val status-badge" id="job-status">—</span></div>
                <div class="kv"><span class="kv__key">Progress</span><span class="kv__val" id="job-progress">0%</span></div>
                <div class="kv"><span class="kv__key">Message</span><span class="kv__val" id="job-message">—</span></div>
            </div>
        </section>

        <!-- ===================== RESULTS TABLE ===================== -->
        <section class="card card--results hidden" id="results-section">
            <div class="card__header-row">
                <h2 class="card__title">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
                    Results
                    <span class="badge" id="results-count">0</span>
                </h2>
                <button class="btn btn--outline" id="export-btn" disabled>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    Export CSV
                </button>
            </div>

            <!-- Stats bar -->
            <div class="stats-bar hidden" id="stats-bar">
                <div class="stat"><span class="stat__num" id="stat-saved">0</span><span class="stat__label">Saved</span></div>
                <div class="stat"><span class="stat__num" id="stat-pages">0</span><span class="stat__label">Pages</span></div>
                <div class="stat"><span class="stat__num" id="stat-dupes">0</span><span class="stat__label">Dupes</span></div>
                <div class="stat"><span class="stat__num" id="stat-rate">—</span><span class="stat__label">Rate</span></div>
                <div class="stat"><span class="stat__num" id="stat-duration">—</span><span class="stat__label">Duration</span></div>
            </div>

            <div class="table-wrapper">
                <table class="table" id="results-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Name</th>
                            <th>Title</th>
                            <th>Company</th>
                            <th>Location</th>
                            <th>Profile</th>
                        </tr>
                    </thead>
                    <tbody id="results-body">
                        <!-- rows injected by JS -->
                    </tbody>
                </table>
            </div>
        </section>

        <!-- ===================== ERROR ===================== -->
        <section class="card card--error hidden" id="error-section">
            <h2 class="card__title" style="color:var(--red)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
                Error
            </h2>
            <p id="error-message" class="error-text"></p>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
